name: Sync LinkedIn Profile Picture

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download LinkedIn profile image
        run: |
          curl -L "YOUR_LINKEDIN_IMAGE_URL" -o public/images/profile.jpg

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add public/images/profile.jpg
          git commit -m "Auto update LinkedIn profile picture" || echo "No changes"
          git push
