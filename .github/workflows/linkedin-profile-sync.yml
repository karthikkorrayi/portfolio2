name: Sync LinkedIn Profile Picture

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Write scraper script
        run: |
          cat > scraper.js << 'SCRAPER_EOF'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const https = require('https');
          const http = require('http');
          const { URL } = require('url');

          function downloadFile(fileUrl, outputPath) {
            return new Promise((resolve, reject) => {
              const urlObj = new URL(fileUrl);
              const protocol = urlObj.protocol === 'https:' ? https : http;
              const file = fs.createWriteStream(outputPath);
              protocol.get(fileUrl, (response) => {
                if (response.statusCode === 301 || response.statusCode === 302) {
                  file.close();
                  downloadFile(response.headers.location, outputPath).then(resolve).catch(reject);
                  return;
                }
                response.pipe(file);
                file.on('finish', () => file.close(resolve));
              }).on('error', (err) => {
                fs.unlink(outputPath, () => {});
                reject(err);
              });
            });
          }

          (async () => {
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });

            const context = await browser.newContext({
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 800 }
            });

            const page = await context.newPage();

            try {
              console.log('Navigating to LinkedIn login...');
              await page.goto('https://www.linkedin.com/login', {
                waitUntil: 'domcontentloaded',
                timeout: 30000
              });
              await page.waitForTimeout(2000);

              console.log('Filling credentials...');
              await page.fill('#username', process.env.LINKEDIN_EMAIL);
              await page.waitForTimeout(500);
              await page.fill('#password', process.env.LINKEDIN_PASSWORD);
              await page.waitForTimeout(500);
              await page.click('[type=submit]');

              console.log('Waiting for login...');
              await page.waitForURL(url => !url.includes('/login'), { timeout: 30000 });
              await page.waitForTimeout(3000);

              const currentUrl = page.url();
              console.log('Current URL after login:', currentUrl);

              if (currentUrl.includes('checkpoint') || currentUrl.includes('challenge')) {
                await page.screenshot({ path: 'debug-screenshot.png' });
                console.error('LinkedIn verification required. See debug screenshot.');
                process.exit(1);
              }

              console.log('Navigating to profile...');
              await page.goto('https://www.linkedin.com/in/karthik-korrayi/', {
                waitUntil: 'domcontentloaded',
                timeout: 30000
              });
              await page.waitForTimeout(4000);

              console.log('Searching for profile image...');

              const selectors = [
                'img.pv-top-card-profile-picture__image--show',
                '.pv-top-card__photo img',
                '.profile-photo-edit__preview',
                'section.artdeco-card img.EntityPhoto-circle',
                'img[class*="profile-photo"]',
                'img[class*="presence-entity"]',
              ];

              let imgUrl = null;

              for (const selector of selectors) {
                try {
                  const el = await page.$(selector);
                  if (el) {
                    const src = await el.getAttribute('src');
                    if (src && src.includes('licdn.com') && !src.includes('ghost')) {
                      imgUrl = src;
                      console.log('Found image with selector:', selector);
                      break;
                    }
                  }
                } catch (e) {
                  // try next selector
                }
              }

              if (!imgUrl) {
                console.log('Trying fallback: scanning all images...');
                imgUrl = await page.evaluate(() => {
                  const imgs = Array.from(document.querySelectorAll('img'));
                  const match = imgs.find(img =>
                    img.src &&
                    img.src.includes('licdn.com') &&
                    img.src.includes('profile-displayphoto') &&
                    img.naturalWidth > 100
                  );
                  return match ? match.src : null;
                });
              }

              if (!imgUrl) {
                await page.screenshot({ path: 'debug-screenshot.png', fullPage: false });
                console.error('Could not find profile image. Debug screenshot saved.');
                process.exit(1);
              }

              console.log('Downloading image from:', imgUrl);
              await downloadFile(imgUrl, 'public/images/profile.jpg');

              const stats = fs.statSync('public/images/profile.jpg');
              console.log('Downloaded file size:', stats.size, 'bytes');

              if (stats.size < 5000) {
                console.error('Downloaded file is too small — likely not a real image.');
                process.exit(1);
              }

              console.log('Profile picture updated successfully!');

            } catch (err) {
              console.error('Error:', err.message);
              await page.screenshot({ path: 'debug-screenshot.png' }).catch(() => {});
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          SCRAPER_EOF

      - name: Run scraper
        env:
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          LINKEDIN_PASSWORD: ${{ secrets.LINKEDIN_PASSWORD }}
        run: node scraper.js

      - name: Upload debug screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug-screenshot.png
          if-no-files-found: ignore

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}
          git add public/images/profile.jpg
          git diff --cached --quiet && echo "No changes to commit" || \
          (git commit -m "Auto-update LinkedIn profile picture $(date +%Y-%m-%d)" && git push)
